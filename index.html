<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Fleet HUD</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    :root { --red: #cc0000; --bg: #0a0a0a; --card: #141414; --border: #2a2a2a; --text: #f0f0f0; --muted: #666; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; }

    .app { max-width: 480px; margin: 0 auto; padding: 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--red); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2d2d2d; transition: background 0.3s; }
    .status-dot.live { background: #00c853; box-shadow: 0 0 6px #00c853; }

    .vehicle-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .vehicle-vin { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 20px; }

    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .card.wide { grid-column: span 2; }
    .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .card-unit { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 3px; }

    .battery-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 10px; }
    .battery-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--red), #ff6b35); transition: width 0.5s; }
    .battery-fill.charging { background: linear-gradient(90deg, #00c853, #69f0ae); }

    .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .status-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
    .status-icon { font-size: 22px; margin-bottom: 4px; }
    .status-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .refresh-bar { text-align: center; color: var(--muted); font-size: 11px; padding: 16px 0; }
    .btn-login { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .btn-login:hover { background: #e60000; }

    #login-screen { text-align: center; padding: 60px 20px; }
    #dashboard { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo"><span>T</span>esla HUD</div>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <div id="login-screen">
      <div style="font-size: 48px; margin-bottom: 16px;">🚗</div>
      <h2 style="margin-bottom: 8px;">Tesla Fleet HUD</h2>
      <p style="color: var(--muted); margin-bottom: 32px; font-size: 14px;">Real-time vehicle telemetry via Tesla Fleet API</p>
      <button class="btn-login" onclick="startAuth()">Connect with Tesla</button>
    </div>

    <div id="dashboard">
      <div class="vehicle-name" id="vehicleName">—</div>
      <div class="vehicle-vin" id="vehicleVin">VIN: —</div>

      <div class="cards">
        <div class="card">
          <div class="card-label">Battery</div>
          <div class="card-value" id="batteryPct">—<span class="card-unit">%</span></div>
          <div class="battery-bar"><div class="battery-fill" id="batteryBar" style="width:0%"></div></div>
        </div>
        <div class="card">
          <div class="card-label">Range</div>
          <div class="card-value" id="range">—<span class="card-unit">km</span></div>
        </div>
        <div class="card">
          <div class="card-label">Inside Temp</div>
          <div class="card-value" id="insideTemp">—<span class="card-unit">°C</span></div>
        </div>
        <div class="card">
          <div class="card-label">Outside Temp</div>
          <div class="card-value" id="outsideTemp">—<span class="card-unit">°C</span></div>
        </div>
        <div class="card wide">
          <div class="card-label">Charging Status</div>
          <div class="card-value" id="chargingStatus" style="font-size:18px">—</div>
        </div>
      </div>

      <div class="status-grid">
        <div class="status-item">
          <div class="status-icon" id="lockIcon">🔒</div>
          <div class="status-label" id="lockLabel">Unknown</div>
        </div>
        <div class="status-item">
          <div class="status-icon" id="climateIcon">❄️</div>
          <div class="status-label" id="climateLabel">Climate</div>
        </div>
        <div class="status-item">
          <div class="status-icon" id="seatyIcon">🚗</div>
          <div class="status-label" id="stateLabel">State</div>
        </div>
      </div>

      <div class="refresh-bar" id="refreshBar">Connecting...</div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    let pollInterval = null;
    const POLL_MS = 8000;

    window.addEventListener('load', () => {
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
      const token = sessionStorage.getItem('tesla_token');
      if (token) initDashboard(token);
    });

    function initDashboard(token) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      fetchVehicleData(token);
      pollInterval = setInterval(() => fetchVehicleData(token), POLL_MS);
    }

    async function fetchVehicleData(token) {
      const dot = document.getElementById('statusDot');
      try {
        const vehicles = await teslaFetch('/api/1/vehicles', token);
        if (!vehicles.response?.length) return;
        const v = vehicles.response[0];

        document.getElementById('vehicleName').textContent = v.display_name || v.vin;
        document.getElementById('vehicleVin').textContent = `VIN: ${v.vin}`;

        const data = await teslaFetch(`/api/1/vehicles/${v.id}/vehicle_data`, token);
        const state = data.response;
        const charge = state.charge_state;
        const climate = state.climate_state;
        const vehicle_state = state.vehicle_state;

        document.getElementById('batteryPct').innerHTML = `${charge.battery_level}<span class="card-unit">%</span>`;
        document.getElementById('batteryBar').style.width = `${charge.battery_level}%`;
        document.getElementById('batteryBar').className = `battery-fill${charge.charging_state === 'Charging' ? ' charging' : ''}`;
        document.getElementById('range').innerHTML = `${Math.round(charge.est_battery_range * 1.609)}<span class="card-unit">km</span>`;
        document.getElementById('insideTemp').innerHTML = `${climate.inside_temp?.toFixed(1) || '—'}<span class="card-unit">°C</span>`;
        document.getElementById('outsideTemp').innerHTML = `${climate.outside_temp?.toFixed(1) || '—'}<span class="card-unit">°C</span>`;
        document.getElementById('chargingStatus').textContent = charge.charging_state === 'Charging'
          ? `⚡ Charging — ${charge.charge_rate} km/hr · ${charge.time_to_full_charge}h remaining`
          : charge.charging_state;

        document.getElementById('lockIcon').textContent = vehicle_state.locked ? '🔒' : '🔓';
        document.getElementById('lockLabel').textContent = vehicle_state.locked ? 'Locked' : 'Unlocked';
        document.getElementById('climateIcon').textContent = climate.is_climate_on ? '🌡️' : '❄️';
        document.getElementById('climateLabel').textContent = climate.is_climate_on ? 'Climate On' : 'Climate Off';
        document.getElementById('stateLabel').textContent = state.state || '—';

        dot.className = 'status-dot live';
        document.getElementById('refreshBar').textContent = `Updated ${new Date().toLocaleTimeString()} · refreshes every 8s`;
      } catch (e) {
        dot.className = 'status-dot';
        document.getElementById('refreshBar').textContent = `Error: ${e.message}`;
      }
    }

    async function teslaFetch(path, token) {
      const res = await fetch(`https://fleet-api.prd.na.vn.cloud.tesla.com${path}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      return res.json();
    }
  </script>
</body>
</html>
